version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: mgift-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mgift}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mgift_secret}
      POSTGRES_DB: ${POSTGRES_DB:-mgift_db}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mgift"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always

  redis:
    image: redis:7-alpine
    container_name: mgift-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always

  kafka:
    image: apache/kafka:3.8.1
    container_name: mgift-kafka
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,EXTERNAL://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
    ports:
      - "29092:29092"
    volumes:
      - kafkadata:/tmp/kraft-combined-logs
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 > /dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 10
    restart: always

  kafdrop:
    image: obsidiandynamics/kafdrop:4.0.2
    container_name: mgift-kafdrop
    environment:
      KAFKA_BROKERCONNECT: kafka:9092
    ports:
      - "9000:9000"
    depends_on:
      kafka:
        condition: service_healthy
    restart: always

  api:
    build: .
    container_name: mgift-api
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    restart: always

  order-worker:
    build: .
    container_name: mgift-order-worker
    env_file: .env
    command: python -m app.workers.order_processor
    depends_on:
      - kafka
      - api
    restart: always

  supplier-worker:
    build: .
    container_name: mgift-supplier-worker
    env_file: .env
    command: python -m app.workers.supplier_handler
    depends_on:
      - kafka
      - redis
      - api
    restart: always

volumes:
  pgdata:
  redisdata:
  kafkadata:
