server {
    listen 80;
    server_name api.mgift.vn;

    # Redirect HTTP -> HTTPS (certbot sẽ tự thêm sau)
    # location / { return 301 https://$host$request_uri; }

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeout cho AI requests (Gemini có thể mất vài giây)
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    # WebSocket cho order tracking real-time
    location /api/v1/orders/ws/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400s;
    }

    # Block Kafdrop từ bên ngoài
    location /kafdrop {
        return 403;
    }
}
